<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff5722" />
    <title>Jadwal Bel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="bg-white p-3 text-center mb-3">
      <p class="fs-5 mb-0">Aplikasi Bell Sekolah</p>
    </div>

    <div class="container main-container">
      <div class="mb-4">
        <a class="quick-action-btn text-decoration-none" href="/"
          ><i class="fa-solid fa-arrow-left"></i> Kembali</a
        >
      </div>
      <div class="status-card">
        <p class="mb-3 fs-4 text-center">Tambah Jadwal Bel</p>
        <hr />
        <form method="POST" class="row g-3">
          <div class="col-12 col-md-6">
            <label>Hari</label>
            <select name="day" class="form-select">
              <option disabled selected>--- pilih hari---</option>
              <option>Senin</option>
              <option>Selasa</option>
              <option>Rabu</option>
              <option>Kamis</option>
              <option>Jumat</option>
              <option>Sabtu</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label>Waktu (HH:MM)</label>
            <input type="time" name="time" class="form-control" required />
          </div>
          <div class="col-12 col-md-6">
            <label>Nama Kegiatan</label>
            <input type="text" name="activity" class="form-control" required />
          </div>
          <div class="col-12 col-md-6">
            <label>Suara Bel / Playlist</label>
            <select name="sound_file" class="form-control" id="soundSelect" required>
              <option disabled selected>--- pilih sound/playlist ---</option>
              <optgroup label="Sound (Single File)">
                {% for sound in sounds %}
                <option value="{{ sound[0] }}">🔊 {{ sound[0] }}</option>
                {% endfor %}
              </optgroup>
              <optgroup label="Playlist (Multiple Files)">
                {% for playlist in playlists %}
                <option value="playlist:{{ playlist[0] }}">📋 {{ playlist[1] }} ({{ playlist[5] }} file)</option>
                {% endfor %}
              </optgroup>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label>Kategori</label>
            <select name="category" class="form-select">
              {% for cat in categories %}
              <option value="{{ cat[1] }}" style="color: {{ cat[3] }}">
                {{ cat[1]|upper }} - {{ cat[2] or cat[1] }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <button type="submit" class="quick-action-btn">
              <i class="fa-solid fa-download"></i> Simpan Jadwal
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
  <script>
    // Add info message when playlist is selected
    document.getElementById('soundSelect').addEventListener('change', function() {
      const selected = this.options[this.selectedIndex];
      if (selected.value.startsWith('playlist:')) {
        alert('Playlist dipilih: "' + selected.text.replace('📋 ', '') + '"\\n\\nSemua file dalam playlist akan diputar berurutan.');
      }
    });
  </script>
</html>
