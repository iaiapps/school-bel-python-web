<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Suara Bel</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="bg-white p-3 text-center">
      <p class="fs-5 mb-0">Aplikasi Bell Sekolah</p>
    </div>

    <div class="container main-container">
      <div class="mb-4">
        <a href="/" class="quick-action-btn text-decoration-none"
          ><i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
      </div>

      <div class="status-card">
        <p class="fs-4 mb-3">Upload Suara Bel</p>
        <hr />
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="name" class="form-label">Nama Sound</label>
            <input type="text" name="name" id="name" class="form-control" />
          </div>
          <div class="mb-3">
            <label for="sound_file" class="form-label">File Sound</label>
            <input
              type="file"
              name="sound_file"
              class="form-control mb-3"
              required
            />
          </div>
          <button type="submit" class="quick-action-btn">
            <i class="fas fa-upload"></i> Upload
          </button>
        </form>
      </div>
      <div class="status-card">
        <p class="mb-3 fs-4">Daftar File Bel</p>
        <hr />
        <ul class="list-group">
          {% for sound in sounds %}
          <li class="list-group-item">
            {{ sound[0] }}. {{ sound[1] }} - {{ sound[2] }}
            <form
              class="d-inline float-end"
              action="{{ url_for('delete_sound', sound_id=sound[0]) }}"
              method="POST"
            >
              <button
                type="submit"
                class="btn btn-sm btn-danger"
                onclick="return confirm('Hapus file ini?')"
              >
                <i class="fas fa-trash"></i> Hapus
              </button>
            </form>
          </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </body>
</html>
